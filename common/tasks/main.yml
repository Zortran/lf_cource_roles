---
- name: Set timezone to Europe/Moscow
  community.general.timezone:
      name: "{{ time_zone }}"

- name: Configure swap file. Block

  block:
      - name: Create a swap file
        ansible.builtin.shell: fallocate -l {{ swap_size }} "{{ swapfile }}"
        args:
            creates: "{{ swapfile }}"
        when: not ansible_check_mode

      - name: Set the correct permissions
        ansible.builtin.file:
            path: "{{ swapfile }}"
            owner: root
            group: root
            mode: "0600"
        when: not ansible_check_mode

      - name: Make the file a swap file
        ansible.builtin.shell: mkswap "{{ swapfile }}"
        when: not ansible_check_mode and ansible_facts.swapfree_mb == 0

      - name: Enable the swap file
        ansible.builtin.shell: swapon "{{ swapfile }}"
        when: not ansible_check_mode and ansible_facts.swapfree_mb == 0

      - name: Add swap file to fstab
        ansible.builtin.mount:
            name: none
            src: "{{ swapfile }}"
            fstype: swap
            opts: sw
            passno: 0
            dump: 0
            state: present

- name: Set hostname
  ansible.builtin.hostname:
      name: "{{ inventory_hostname }}"
  notify:
      - Reboot
